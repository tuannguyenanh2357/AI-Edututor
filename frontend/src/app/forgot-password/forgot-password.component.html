<div class="forgot-password-container">
  <div class="login-card">
    <div class="logo-icon">
      <i class="fa-solid fa-key"></i>
    </div>

    <h2 class="title">Quên mật khẩu?</h2>
    <p class="subtitle">Nhập email của bạn để nhận hướng dẫn đặt lại mật khẩu</p>

    <form (ngSubmit)="onSubmit()" #forgotForm="ngForm">
      <div class="input-group">
        <label for="email">Địa chỉ Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          required 
          email
          placeholder="Nhập email của bạn"
          [disabled]="isLoading"
        >
      </div>

      <div *ngIf="message" class="alert success">
        {{ message }}
      </div>

      <div *ngIf="error" class="alert error">
        {{ error }}
      </div>

      <button type="submit" [disabled]="!forgotForm.valid || isLoading" class="btn-primary">
        <span *ngIf="!isLoading">Gửi yêu cầu</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>

      <div class="footer">
        <a routerLink="/login">Quay lại đăng nhập</a>
      </div>
    </form>

    <div class="card-bottom-line"></div>
  </div>
</div>
