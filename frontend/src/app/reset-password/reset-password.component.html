<div class="reset-password-container">
  <div class="login-card">
    <div class="logo-icon">
      <i class="fa-solid fa-lock"></i>
    </div>

    <h2 class="title">Đặt lại mật khẩu</h2>
    <p class="subtitle">Vui lòng nhập mật khẩu mới của bạn</p>

    <form (ngSubmit)="onSubmit()" #resetForm="ngForm">
      <div class="input-group">
        <label for="password">Mật khẩu mới</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          minlength="6"
          placeholder="Nhập mật khẩu mới"
          [disabled]="isLoading"
        >
      </div>

      <div class="input-group">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          [(ngModel)]="confirmPassword" 
          required 
          placeholder="Xác nhận mật khẩu mới"
          [disabled]="isLoading"
        >
      </div>

      <div *ngIf="message" class="alert success">
        {{ message }}
      </div>

      <div *ngIf="error" class="alert error">
        {{ error }}
      </div>

      <button type="submit" [disabled]="!resetForm.valid || isLoading || (!!error && !password)" class="btn-primary">
        <span *ngIf="!isLoading">Cập nhật mật khẩu</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>

      <div class="footer">
        <a routerLink="/login">Quay lại đăng nhập</a>
      </div>
    </form>

    <div class="card-bottom-line"></div>
  </div>
</div>
